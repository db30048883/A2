<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>A2 Gradation</title>
  <link rel="manifest" href="manifest.json" />
  <script src="exceljs.min.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js')
          .then(reg => console.log('SW registered:', reg))
          .catch(err => console.error('SW failed:', err));
      });
    }
    window.addEventListener('beforeunload', (e) => {
      e.preventDefault();
      e.returnValue = '';
    });

    // Prevent iOS Safari double-tap zoom on buttons
    document.addEventListener('touchstart', function(e) {
      if (e.target.tagName === 'BUTTON') {
        e.preventDefault();
        e.target.click();
      }
    }, { passive: false });
  </script>
  <style>
    :root {
      --bg: #1e1e1e; --panel:#2c2c2c; --muted:#3a3a3a; --text:#f0f0f0; --brand:#22c55e; --brand-d:#16a34a; --warn:#f59e0b; --bad:#ef4444; --good:#10b981; --info:#7dd3fc;
    }
    * { box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background-color: var(--bg); color: var(--text); padding: 20px; }
    .container { background: var(--panel); padding: 20px; border-radius: 12px; box-shadow: 0 0 20px rgba(0,0,0,0.35); max-width: 1100px; margin: auto; }
    h1 { text-align: center; margin-top: 0; }
    .row { display: grid; grid-template-columns: 1fr; gap: 12px; }
    @media (max-width: 759px){
      body { padding: 10px; }
      .container { padding: 12px; }
      .controls-column { order: -1; }
    }
    @media (min-width: 760px){ .row { grid-template-columns: 2fr 1fr; } }

    .spec-banner {
      margin: 0 0 14px;
      padding: 13px 16px;
      border: 2px solid #38bdf8;
      border-radius: 10px;
      background: rgba(14,165,233,.12);
      color: #e0f2fe;
      font-size: 17px;
      font-weight: 700;
      text-align: center;
    }

    #rockWeight { width: 100%; padding: 16px; font-size: 24px; border-radius: 10px; border: none; background-color: #444; color: white; text-align: right; letter-spacing: 1px; }
    .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
    .numpad button { padding: 18px; font-size: 22px; border-radius: 10px; border: none; background-color: var(--brand); color: white; cursor: pointer; touch-action: manipulation; }
    .numpad button:hover { background-color: var(--brand-d); }
    .enter-button { grid-column: span 3; padding: 22px; font-size: 20px; margin-top: 6px; }
    button.action { width: 100%; padding: 12px; margin: 6px 0; background-color: #28a745; color: white; font-size: 16px; border: none; border-radius: 8px; cursor: pointer; touch-action: manipulation; }
    button.secondary { background: #475569; }
    .inline { display:inline-flex; gap:8px; flex-wrap:wrap }

    details > summary { list-style: none; }
    summary.settings { background-color: var(--warn); color: white; padding: 12px; margin: 8px 0; border-radius: 8px; cursor: pointer; font-size: 16px; text-align: center; }

    /* Larger, glove-friendly criteria panel */
    .criteria-settings > summary.settings {
      padding: 18px 16px;
      font-size: 21px;
      font-weight: 700;
      letter-spacing: .2px;
    }
    .criteria-settings > summary.settings::after {
      content: ' ▼';
      font-size: 15px;
    }
    .criteria-settings[open] > summary.settings::after { content: ' ▲'; }
    .criteria-settings[open] {
      position: fixed;
      left: 50%;
      bottom: 12px;
      transform: translateX(-50%);
      z-index: 1000;
      width: min(920px, calc(100vw - 24px));
      max-height: calc(100vh - 24px);
      padding: 10px;
      overflow-y: auto;
      background: var(--panel);
      border: 2px solid #64748b;
      border-radius: 14px;
      box-shadow: 0 -8px 35px rgba(0,0,0,.65);
    }
    .criteria-settings[open] > summary.settings { margin: 0 0 10px; }
    .criteria-settings[open] .criteria-card { margin-top: 0 !important; }
    .criteria-card { padding: 18px; }
    .settings-grid { display: grid; grid-template-columns: 1fr; gap: 14px; }
    .setting-field {
      display: grid;
      gap: 7px;
      color: #f8fafc;
      font-size: 17px;
      font-weight: 700;
    }
    .setting-field input {
      width: 100%;
      min-height: 58px;
      padding: 12px 14px;
      border: 2px solid #64748b;
      border-radius: 9px;
      background: #171717;
      color: #fff;
      font-size: 23px;
      font-variant-numeric: tabular-nums;
    }
    .setting-field input:focus { outline: 3px solid var(--info); border-color: transparent; }
    .range-inputs { display: grid; grid-template-columns: minmax(0,1fr) auto minmax(0,1fr); gap: 12px; align-items: center; }
    .range-inputs span { color: #cbd5e1; font-size: 20px; }
    .settings-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 18px; }
    .settings-actions button {
      min-height: 52px;
      border: 0;
      border-radius: 9px;
      color: white;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      touch-action: manipulation;
    }
    #saveSettings { background: var(--brand-d); }
    #resetSettings { background: #475569; }
    @media (min-width: 760px) {
      .settings-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    #results, #savedLogs, #rockList { margin-top: 16px; }
    pre { background-color: var(--muted); padding: 12px; overflow-x: auto; border-radius: 8px; }
    .log-entry { margin: 7px 0; padding: 9px; display:flex; align-items:center; gap:8px; border:1px solid #444; border-left-width:5px; border-radius:8px; background:#202020; }
    .log-entry.rock-pass { border-left-color: var(--good); }
    .log-entry.rock-fail { border-left-color: var(--bad); background:rgba(239,68,68,.08); }
    .log-entry input { min-width:0; width:140px; padding:8px 10px; border-radius:8px; border:1px solid #555; background:#151515; color:#fff; font-size:18px; }
    .rock-status { margin-left:auto; padding:4px 8px; border-radius:999px; font-size:11px; font-weight:800; }
    .rock-status.in-spec { color:#6ee7b7; background:rgba(16,185,129,.16); }
    .rock-status.out-spec { color:#fca5a5; background:rgba(239,68,68,.18); }

    .lot-status-card { margin-bottom:10px; padding:18px; border:2px solid; border-radius:12px; text-align:center; }
    .lot-status-card.waiting { border-color:var(--warn); background:rgba(245,158,11,.13); }
    .lot-status-card.passing { border-color:var(--good); background:rgba(16,185,129,.14); }
    .lot-status-card.failing { border-color:var(--bad); background:rgba(239,68,68,.14); }
    .lot-status-label { font-size:13px; font-weight:800; letter-spacing:1.5px; }
    .lot-status-value { margin:4px 0; font-size:30px; font-weight:900; }
    .lot-status-reason { color:#e2e8f0; font-size:15px; }
    .stat-grid { display:grid; grid-template-columns: 1fr; gap:10px; }
    @media (min-width: 520px){ .stat-grid { grid-template-columns: repeat(2,1fr); } }
    .card { background: #232323; border:1px solid #333; border-radius:10px; padding:12px }
    .muted { color:#cbd5e1; font-size:12px }
    .badge { display:inline-block; padding:2px 8px; border-radius:20px; font-size:12px; margin-left:6px }
    .pass { background: rgba(16,185,129,.15); color: var(--good); border:1px solid rgba(16,185,129,.35) }
    .fail { background: rgba(239,68,68,.15); color: var(--bad); border:1px solid rgba(239,68,68,.35) }
    .waiting-badge { background:rgba(245,158,11,.15); color:#fbbf24; border:1px solid rgba(245,158,11,.4); }

    .kv { display:flex; justify-content:space-between; align-items:center; margin:4px 0; }
    .kv strong { font-size: 14px; }

    .chips { display:flex; flex-wrap:wrap; gap:8px }
    .chip { padding:6px 10px; background:#334155; border-radius:999px; font-size:12px; cursor:pointer; touch-action: manipulation; }
  </style>
</head>
<body>
  <div class="container">
    <h1>A2 Gradation</h1>
    <div class="spec-banner" id="specBanner"></div>

    <div class="row">
      <!-- Left side: Results -->
      <div class="results-column">
        <div id="results"></div>
        <div id="rockList"></div>
        <div id="savedLogs"></div>
      </div>

      <!-- Right side: Numpad and Controls -->
      <div class="controls-column">
        <input type="text" id="rockWeight" placeholder="Enter rock weight (tons)" readonly>
        <div class="numpad" id="numpad"></div>
        <div class="inline">
          <button class="action" id="undoBtn">Undo Last</button>
          <button class="action secondary" id="resetBtn">Reset Current</button>
          <button class="action" id="finishBtn">Finish + Save Log</button>
        </div>
        <details class="more-options">
          <summary class="settings">More Options</summary>
          <div style="margin-top: 10px;">
            <div class="inline">
              <button class="action" id="viewSaved">View Saved Logs</button>
              <button class="action" id="dlLastTxt">Download Last Log (.txt)</button>
              <button class="action" id="dlLastCsv">Export Last Log (.csv)</button>
              <button class="action" style="background:#d9a514;color:#111;font-weight:700" id="dlLastXlsx">Export Branded Report (.xlsx)</button>
            </div>
            <div class="inline">
              <button class="action secondary" id="dlAllTxt">Export All Logs (.txt)</button>
              <button class="action secondary" id="dlAllCsv">Export All Logs (.csv)</button>
              <button class="action secondary" id="dlAllXlsx">Export All Branded Reports (.xlsx)</button>
              <button class="action" style="background:#dc2626" id="clearAll">Clear All Logs</button>
            </div>

            <details class="criteria-settings">
              <summary class="settings" style="background:#06b6d4">Spec Settings</summary>
              <div class="card criteria-card" style="margin-top:10px">
                <div class="settings-grid">
                  <label class="setting-field">Average pass minimum (tons)
                    <input id="avgMin" type="number" step="0.01" inputmode="decimal"/>
                  </label>
                  <label class="setting-field">Allowed weight range (tons)
                    <span class="range-inputs"><input id="inMin" type="number" step="0.01" inputmode="decimal"/><span>to</span><input id="inMax" type="number" step="0.01" inputmode="decimal"/></span>
                  </label>
                </div>
                <div class="settings-actions">
                  <button id="saveSettings">Save Settings</button>
                  <button id="resetSettings">Reset Defaults</button>
                </div>
              </div>
            </details>
          </div>
        </details>
      </div>
    </div>
  </div>

    const savedSettings = JSON.parse(localStorage.getItem('a2RockSettings') || 'null');
    let SETTINGS = localStorage.getItem('a2RockSpecVersion') === SPEC_VERSION
      ? { ...DEFAULTS, ...(savedSettings || {}) }
      : { ...DEFAULTS };

    // Apply the A2 specification once for existing installations with older settings.
    if (localStorage.getItem('a2RockSpecVersion') !== SPEC_VERSION) {
      localStorage.setItem('a2RockSettings', JSON.stringify(SETTINGS));
      localStorage.setItem('a2RockSpecVersion', SPEC_VERSION);
    }

    function saveSettings(){ localStorage.setItem('a2RockSettings', JSON.stringify(SETTINGS)); updateDisplay(); }
    function resetSettings(){ SETTINGS = { ...DEFAULTS }; localStorage.setItem('a2RockSpecVersion', SPEC_VERSION); saveSettings(); loadSettingsUI(); }
    function loadSettingsUI(){
      for (const k of Object.keys(DEFAULTS)) {
        const el = document.getElementById(k);
        if (el) el.value = SETTINGS[k];
      }
    }

    // ===== Numpad & Input =====
    const buttons = ['1','2','3','4','5','6','7','8','9','.', '0','⌫'];
    buttons.forEach(char => {
      const btn = document.createElement('button');
      btn.textContent = char;
      btn.onclick = () => handleNumpad(char);
      numpad.appendChild(btn);
    });
    const enterBtn = document.createElement('button');
    enterBtn.textContent = 'Enter Weight';
    enterBtn.className = 'numpad button enter-button';
    enterBtn.onclick = () => handleNumpad('ENT');
    numpad.appendChild(enterBtn);

    function handleNumpad(char) {
      if (char === '⌫') {
        currentEntry = currentEntry.slice(0, -1);
      } else if (char === 'ENT') {
        const weight = parseFloat(currentEntry);
        if (!isNaN(weight)) {
          rockWeights.push(weight);
          updateDisplay();
        }
        currentEntry = '';
      } else {
        currentEntry += char;
      }
      input.value = currentEntry;
    }

    // Keyboard support
    window.addEventListener('keydown', (e)=>{
      // Let settings and other editable fields receive their own keystrokes.
      const target = e.target;
      if (target instanceof HTMLElement &&
          (target.matches('input, textarea, select') || target.isContentEditable)) return;

      if (e.key === 'Enter') handleNumpad('ENT');
      else if (e.key === 'Backspace') handleNumpad('⌫');
      else if (/^[0-9.]$/.test(e.key)) handleNumpad(e.key);
    });

    // ===== Helpers =====
    function sum(arr){ return arr.reduce((s,v)=>s+v,0); }
    function bucketize(weights){
      const S = SETTINGS;
      const undersize = weights.filter(w => w < S.inMin);
      const inspec = weights.filter(w => w >= S.inMin && w <= S.inMax);
      const oversize = weights.filter(w => w > S.inMax);
      return { undersize, inspec, oversize };
    }

    function stats(){
      const total = rockWeights.length;
      const totalTons = sum(rockWeights);
      const avgTons = total>0 ? totalTons/total : 0;
      const { undersize, inspec, oversize } = bucketize(rockWeights);
      return { total, totalTons, avgTons, undersize, inspec, oversize };
    }

    function fmtTons(value){
      return Number(value).toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
    }
    function badge(state){
      if (state === null) return '<span class="badge waiting-badge">WAITING</span>';
      return `<span class="badge ${state?'pass':'fail'}">${state?'PASS':'FAIL'}</span>`;
    }
    function rockClassification(weight){
      if (weight < SETTINGS.inMin) return { rowClass:'rock-fail', label:'UNDERSIZE', badgeClass:'out-spec' };
      if (weight > SETTINGS.inMax) return { rowClass:'rock-fail', label:'OVERSIZE', badgeClass:'out-spec' };
      return { rowClass:'rock-pass', label:'IN SPEC', badgeClass:'in-spec' };
    }

    // ===== UI Rendering =====
    function updateDisplay() {
      localStorage.setItem('a2RockAutosaveTons', JSON.stringify(rockWeights));
      const S = SETTINGS;
      const st = stats();
      const hasRocks = st.total > 0;

      currentLog = {
        timestamp: new Date().toLocaleString(),
        weights: [...rockWeights],
        total: st.total,
        totalTons: +st.totalTons.toFixed(3),
        avgTons: +st.avgTons.toFixed(3),
        specMin: S.inMin,
        specMax: S.inMax,
        requiredAvg: S.avgMin,
        undersize: st.undersize.length,
        inspec: st.inspec.length,
        oversize: st.oversize.length,
        lotPass: hasRocks && st.avgTons >= S.avgMin && st.undersize.length === 0 && st.oversize.length === 0
      };

      const avgOk = hasRocks && st.avgTons >= S.avgMin;
      const weightsOk = hasRocks && st.undersize.length === 0 && st.oversize.length === 0;
      const lotPass = hasRocks && avgOk && weightsOk;
      const failures = [];
      if (hasRocks && st.undersize.length) failures.push(`${st.undersize.length} undersize rock${st.undersize.length === 1 ? '' : 's'}`);
      if (hasRocks && st.oversize.length) failures.push(`${st.oversize.length} oversize rock${st.oversize.length === 1 ? '' : 's'}`);
      if (hasRocks && !avgOk) failures.push(`average is ${fmtTons(S.avgMin - st.avgTons)} tons below minimum`);
      const lotClass = !hasRocks ? 'waiting' : lotPass ? 'passing' : 'failing';
      const lotLabel = !hasRocks ? 'ENTER ROCKS' : lotPass ? 'LOT PASSES' : 'LOT FAILS';
      const lotReason = !hasRocks
        ? 'Enter the first rock weight to begin.'
        : lotPass
          ? `All ${st.total} rock${st.total === 1 ? '' : 's'} meet the weight range and average requirements.`
          : failures.join(' • ');

      document.getElementById('specBanner').innerHTML =
        `A2 SPEC: ${fmtTons(S.inMin)}&ndash;${fmtTons(S.inMax)} tons &nbsp;|&nbsp; Average &ge; ${fmtTons(S.avgMin)} tons &nbsp;|&nbsp; Zero out-of-spec allowed`;

      const res = `
        <div class="lot-status-card ${lotClass}">
          <div class="lot-status-label">LOT STATUS</div>
          <div class="lot-status-value">${lotLabel}</div>
          <div class="lot-status-reason">${lotReason}</div>
        </div>
        <div class="stat-grid">
          <div class="card"><div class="kv"><strong>Rocks entered</strong><div>${st.total}</div></div>
            <div class="kv"><span class="muted">Total tons</span><div>${st.totalTons.toFixed(3)} tons</div></div>
            <div class="kv"><span class="muted">Average</span><div>${hasRocks ? `${fmtTons(st.avgTons)} tons` : '&mdash;'} ${badge(hasRocks ? avgOk : null)}</div></div>
          </div>
          <div class="card"><div class="kv"><strong>Individual weights</strong><div>${badge(hasRocks ? weightsOk : null)}</div></div>
            <div class="kv"><span class="muted">Undersize (&lt;${fmtTons(S.inMin)})</span><div>${st.undersize.length}</div></div>
            <div class="kv"><span class="muted">In spec (${fmtTons(S.inMin)}&ndash;${fmtTons(S.inMax)})</span><div>${st.inspec.length}</div></div>
            <div class="kv"><span class="muted">Oversize (&gt;${fmtTons(S.inMax)})</span><div>${st.oversize.length}</div></div>
          </div>
        </div>`;

      document.getElementById('results').innerHTML = res;

      document.getElementById('rockList').innerHTML = rockWeights.length
        ? `<p><strong>Entered Rocks <span class="muted">(tap a weight to edit)</span></strong></p>${rockWeights.map((w, i) => {
            const status = rockClassification(w);
            return `<div class="log-entry ${status.rowClass}">
              <span>${i + 1}.</span>
              <input aria-label="Rock ${i + 1} weight" type="number" value="${w}" step="0.01" onchange="updateWeight(${i}, this.value)" /> tons
              <span class="rock-status ${status.badgeClass}">${status.label}</span>
              <button class="chip" onclick="removeWeight(${i})">Remove</button>
            </div>`;
          }).join('')}`
        : '<p class="muted">No rocks entered yet.</p>';
    }

    // ===== CRUD operations =====
    function updateWeight(index, value) {
      const v = parseFloat(value);
      if (!isNaN(v)) { rockWeights[index] = v; updateDisplay(); }
    }
    function removeWeight(index){ rockWeights.splice(index,1); updateDisplay(); }

    function finishLog() {
      if (!rockWeights.length) { alert('Add some rocks first!'); return; }
      const logs = JSON.parse(localStorage.getItem('a2RockLogsTons') || '[]');
      logs.push(currentLog);
      localStorage.setItem('a2RockLogsTons', JSON.stringify(logs));
      alert('Log saved!');
      rockWeights = [];
      updateDisplay();
    }

    function viewSavedLogs() {
      const logs = JSON.parse(localStorage.getItem('a2RockLogsTons') || '[]');
      if (!logs.length) { document.getElementById('savedLogs').innerHTML = '<p>No saved logs found.</p>'; return; }
      const detailed = logs.map((log, idx) => `Log ${idx + 1} — ${log.timestamp}\n  Total: ${log.total} rocks\n  Total Tons: ${(+log.totalTons).toFixed(3)} tons\n  Average: ${(+log.avgTons).toFixed(3)} tons\n  Undersize: ${log.undersize || 0}\n  In Spec: ${log.inspec || 0}\n  Oversize: ${log.oversize || 0}\n  Lot Status: ${log.lotPass === true ? 'PASS' : 'FAIL'}\n  Weights (tons): ${log.weights.join(', ')}`).join('\n\n');
      document.getElementById('savedLogs').innerHTML = `
        <h3>All Saved Logs (${logs.length})</h3>
        <pre>${detailed}</pre>
      `;
    }

    function downloadLastLog() {
      const logs = JSON.parse(localStorage.getItem('a2RockLogsTons') || '[]');
      if (!logs.length) { alert('No logs available to download.'); return; }
      const log = logs[logs.length - 1];
      const content = `Timestamp: ${log.timestamp}\nTotal Rocks: ${log.total}\nTotal Tons: ${(+log.totalTons).toFixed(3)} tons\nAverage: ${(+log.avgTons).toFixed(3)} tons\nUndersize: ${log.undersize || 0}\nIn Spec: ${log.inspec || 0}\nOversize: ${log.oversize || 0}\nLot Status: ${log.lotPass === true ? 'PASS' : 'FAIL'}\nWeights (tons): ${log.weights.join(', ')}`;
      const blob = new Blob([content], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `a2_log_${new Date().toISOString().split('T')[0]}.txt`;
      document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
    }

    function csvCell(value) {
      const text = String(value ?? '');
      return /[",\r\n]/.test(text) ? `"${text.replace(/"/g, '""')}"` : text;
    }

    function csvRow(values) { return values.map(csvCell).join(','); }

    function reportRows(log, title) {
      const specMin = Number(log.specMin ?? SETTINGS.inMin);
      const specMax = Number(log.specMax ?? SETTINGS.inMax);
      const requiredAvg = Number(log.requiredAvg ?? SETTINGS.avgMin);
      const rows = [
        [title],
        [],
        ['REPORT INFORMATION'],
        ['Log Date', log.timestamp],
        ['Generated', new Date().toLocaleString()],
        [],
        ['LOT SUMMARY'],
        ['Lot Status', log.lotPass === true ? 'PASS' : 'FAIL'],
        ['Allowed Weight Range', `${fmtTons(specMin)}–${fmtTons(specMax)} tons`],
        ['Required Average', `${fmtTons(requiredAvg)} tons minimum`],
        ['Total Rocks', log.total],
        ['Total Tons', (+log.totalTons).toFixed(3)],
        ['Average Weight (tons)', (+log.avgTons).toFixed(3)],
        ['Undersize Count', log.undersize || 0],
        ['In-Spec Count', log.inspec || 0],
        ['Oversize Count', log.oversize || 0],
        [],
        ['ROCK DETAILS'],
        ['Rock Number', 'Weight (tons)', 'Classification']
      ];

      log.weights.forEach((weight, index) => {
        const classification = weight < specMin ? 'UNDERSIZE' : weight > specMax ? 'OVERSIZE' : 'IN SPEC';
        rows.push([index + 1, Number(weight).toFixed(3), classification]);
      });
      return rows;
    }

    function downloadCsvRows(rows, filename) {
      const csv = '\uFEFF' + rows.map(csvRow).join('\r\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function downloadCSV() {
      const logs = JSON.parse(localStorage.getItem('a2RockLogsTons') || '[]');
      if (!logs.length) { alert('No logs to export.'); return; }
      const log = logs[logs.length - 1];
      downloadCsvRows(reportRows(log, 'A2 GRADATION REPORT'), `A2_Gradation_Report_${new Date().toISOString().split('T')[0]}.csv`);
    }

    function downloadAllLogsTxt() {
      const logs = JSON.parse(localStorage.getItem('a2RockLogsTons') || '[]');
      if (!logs.length) { alert('No logs available.'); return; }
      const content = logs.map((log, idx) => `Log ${idx + 1} — ${log.timestamp}\nTotal: ${log.total} rocks\nTotal Tons: ${(+log.totalTons).toFixed(3)} tons\nAverage: ${(+log.avgTons).toFixed(3)} tons\nUndersize: ${log.undersize || 0}\nIn Spec: ${log.inspec || 0}\nOversize: ${log.oversize || 0}\nLot Status: ${log.lotPass === true ? 'PASS' : 'FAIL'}\nWeights (tons): ${log.weights.join(', ')}`).join('\n\n');
      const blob = new Blob([content], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = `a2_logs_all_${new Date().toISOString().split('T')[0]}.txt`;
      document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
    }

    function downloadAllLogsCSV() {
      const logs = JSON.parse(localStorage.getItem('a2RockLogsTons') || '[]');
      if (!logs.length) { alert('No logs available.'); return; }
      const rows = [
        ['A2 ALL GRADATION LOGS'],
        ['Generated', new Date().toLocaleString()],
        ['Total Logs', logs.length],
        []
      ];
      logs.forEach((log, idx) => {
        rows.push(...reportRows(log, `LOG ${idx + 1}`), [], []);
      });
      downloadCsvRows(rows, `A2_All_Gradation_Logs_${new Date().toISOString().split('T')[0]}.csv`);
    }

    function addBrandedReportSheet(workbook, log, sheetName, logoId) {
      const sheet = workbook.addWorksheet(sheetName, {
        properties: { defaultRowHeight: 18 },
        pageSetup: { orientation: 'portrait', fitToPage: true, fitToWidth: 1, fitToHeight: 0 }
      });
      sheet.views = [{ showGridLines: false }];
      sheet.columns = [
        { key: 'label', width: 25 },
        { key: 'value', width: 22 },
        { key: 'status', width: 24 }
      ];

      for (let row = 1; row <= 14; row++) sheet.getRow(row).height = 18;
      sheet.addImage(logoId, { tl: { col: 0, row: 0 }, ext: { width: 360, height: 258 } });

      const specMin = Number(log.specMin ?? SETTINGS.inMin);
      const specMax = Number(log.specMax ?? SETTINGS.inMax);
      const requiredAvg = Number(log.requiredAvg ?? SETTINGS.avgMin);
      const statusText = log.lotPass === true ? 'LOT PASSES' : 'LOT FAILS';
      const statusColor = log.lotPass === true ? 'FF16A34A' : 'FFDC2626';
      const yellow = 'FFFFC425';
      const black = 'FF111111';
      const lightGray = 'FFF1F5F9';
      const border = { style: 'thin', color: { argb: 'FFD1D5DB' } };

      sheet.mergeCells('A16:C16');
      const title = sheet.getCell('A16');
      title.value = 'A2 GRADATION REPORT';
      title.font = { bold: true, size: 18, color: { argb: yellow } };
      title.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: black } };
      title.alignment = { horizontal: 'center', vertical: 'middle' };
      sheet.getRow(16).height = 32;

      sheet.mergeCells('A17:C17');
      const status = sheet.getCell('A17');
      status.value = statusText;
      status.font = { bold: true, size: 15, color: { argb: 'FFFFFFFF' } };
      status.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: statusColor } };
      status.alignment = { horizontal: 'center', vertical: 'middle' };
      sheet.getRow(17).height = 26;

      sheet.mergeCells('A19:C19');
      const summaryHeader = sheet.getCell('A19');
      summaryHeader.value = 'LOT SUMMARY';
      summaryHeader.font = { bold: true, color: { argb: black } };
      summaryHeader.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: yellow } };
      summaryHeader.alignment = { horizontal: 'left' };

      const summaryRows = [
        ['Log Date', log.timestamp, ''],
        ['Allowed Weight Range', `${fmtTons(specMin)}–${fmtTons(specMax)} tons`, ''],
        ['Required Average', requiredAvg, 'tons minimum'],
        ['Total Rocks', log.total, 'rocks'],
        ['Total Weight', +log.totalTons, 'tons'],
        ['Average Weight', +log.avgTons, 'tons'],
        ['Undersize', log.undersize || 0, 'rocks'],
        ['In Spec', log.inspec || 0, 'rocks'],
        ['Oversize', log.oversize || 0, 'rocks']
      ];
      summaryRows.forEach((values, index) => {
        const row = sheet.getRow(20 + index);
        row.values = values;
        row.getCell(1).font = { bold: true };
        row.getCell(1).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: lightGray } };
        row.eachCell(cell => { cell.border = { bottom: border }; });
      });
      sheet.getCell('B22').numFmt = '0.000';
      sheet.getCell('B24').numFmt = '0.000';
      sheet.getCell('B25').numFmt = '0.000';

      sheet.mergeCells('A30:C30');
      const detailsHeader = sheet.getCell('A30');
      detailsHeader.value = 'ROCK DETAILS';
      detailsHeader.font = { bold: true, color: { argb: black } };
      detailsHeader.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: yellow } };

      const headerRow = sheet.getRow(31);
      headerRow.values = ['Rock Number', 'Weight (tons)', 'Classification'];
      headerRow.font = { bold: true, color: { argb: 'FFFFFFFF' } };
      headerRow.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: black } };
      headerRow.alignment = { horizontal: 'center' };

      log.weights.forEach((weight, index) => {
        const classification = weight < specMin ? 'UNDERSIZE' : weight > specMax ? 'OVERSIZE' : 'IN SPEC';
        const row = sheet.getRow(32 + index);
        row.values = [index + 1, Number(weight), classification];
        row.getCell(1).alignment = { horizontal: 'center' };
        row.getCell(2).numFmt = '0.000';
        row.getCell(3).font = { bold: true, color: { argb: classification === 'IN SPEC' ? 'FF047857' : 'FFB91C1C' } };
        row.eachCell(cell => { cell.border = { bottom: border }; });
      });

      sheet.pageSetup.printArea = `A1:C${Math.max(32, 31 + log.weights.length)}`;
      sheet.headerFooter.oddFooter = '&LKiewit&CPage &P of &N&RGenerated by A2 Gradation';
      return sheet;
    }

    async function downloadExcelReports(allLogs) {
      if (typeof ExcelJS === 'undefined') {
        alert('Excel export is not ready yet. Connect to the internet once, reopen the app, and try again.');
        return;
      }
      const logs = JSON.parse(localStorage.getItem('a2RockLogsTons') || '[]');
      if (!logs.length) { alert('No saved logs available to export.'); return; }
      const selectedLogs = allLogs ? logs : [logs[logs.length - 1]];
      const workbook = new ExcelJS.Workbook();
      workbook.creator = 'Kiewit';
      workbook.company = 'Kiewit';
      workbook.created = new Date();
      const logoId = workbook.addImage({ base64: KIEWIT_LOGO_BASE64, extension: 'png' });
      selectedLogs.forEach((log, index) => addBrandedReportSheet(workbook, log, allLogs ? `Log ${index + 1}` : 'A2 Report', logoId));
      const buffer = await workbook.xlsx.writeBuffer();
      const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = allLogs
        ? `A2_All_Branded_Reports_${new Date().toISOString().split('T')[0]}.xlsx`
        : `A2_Branded_Report_${new Date().toISOString().split('T')[0]}.xlsx`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function clearAllLogs() {
      if (confirm('Are you sure you want to delete ALL saved logs? This cannot be undone.')) {
        localStorage.removeItem('a2RockLogsTons');
        document.getElementById('savedLogs').innerHTML = '<p>All logs cleared.</p>';
      }
    }

    function resetLog() {
      if (confirm('Reset the current log? This cannot be undone.')) {
        rockWeights = [];
        currentEntry = '';
        input.value = '';
        updateDisplay();
      }
    }

    function undoLast(){ if(rockWeights.length){ rockWeights.pop(); updateDisplay(); } }

    // Wire buttons
    document.getElementById('finishBtn').onclick = finishLog;
    document.getElementById('viewSaved').onclick = viewSavedLogs;
    document.getElementById('dlLastTxt').onclick = downloadLastLog;
    document.getElementById('dlLastCsv').onclick = downloadCSV;
    document.getElementById('dlLastXlsx').onclick = () => downloadExcelReports(false);
    document.getElementById('dlAllTxt').onclick = downloadAllLogsTxt;
    document.getElementById('dlAllCsv').onclick = downloadAllLogsCSV;
    document.getElementById('dlAllXlsx').onclick = () => downloadExcelReports(true);
    document.getElementById('clearAll').onclick = clearAllLogs;
    document.getElementById('resetBtn').onclick = resetLog;
    document.getElementById('undoBtn').onclick = undoLast;

    document.getElementById('saveSettings').onclick = () => {
      const fields = ['avgMin','inMin','inMax'];
      for (const k of fields){ const el = document.getElementById(k); const v = parseFloat(el.value); if(!isNaN(v)) SETTINGS[k] = v; }
      saveSettings();
      document.querySelector('.criteria-settings').open = false;
      document.querySelector('.more-options').open = false;
    };
    document.getElementById('resetSettings').onclick = resetSettings;

    // Init
    loadSettingsUI();
    updateDisplay();
  </script>
</body>
</html>
